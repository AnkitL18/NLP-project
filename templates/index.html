<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: white;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p {
      color: #a0aec0;
      font-size: 0.95rem;
    }

    /* Main card */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 900px;
    }

    /* Text areas row */
    .translator-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 20px;
    }

    .text-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lang-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 14px;
    }

    .lang-bar select {
      background: transparent;
      border: none;
      color: white;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      flex: 1;
    }
    .lang-bar select option { background: #1a1a2e; color: white; }

    .detected-badge {
      background: linear-gradient(90deg, #00d4ff33, #7b2ff733);
      border: 1px solid #00d4ff55;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #00d4ff;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px;
      color: white;
      font-size: 1rem;
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #00d4ff55; }
    textarea::placeholder { color: #4a5568; }
    #output-text { color: #e2e8f0; }

    /* Swap button */
    .swap-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 46px;
    }
    .swap-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
      color: white;
    }
    .swap-btn:hover { background: rgba(0,212,255,0.2); border-color: #00d4ff; }

    /* Char count */
    .char-count {
      font-size: 0.78rem;
      color: #4a5568;
      text-align: right;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 32px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: white;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Info bar */
    .info-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    .info-chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: #a0aec0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-chip span { color: #00d4ff; font-weight: 600; }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Copy button */
    .copy-btn {
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .copy-btn:hover { color: #00d4ff; }

    /* Error message */
    .error-msg {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 10px;
      padding: 12px 18px;
      color: #fc8181;
      font-size: 0.88rem;
      display: none;
      margin-bottom: 16px;
      text-align: center;
    }

    /* Stats bar */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 10px;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .lbl {
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 4px;
    }

    @media (max-width: 650px) {
      .translator-row { grid-template-columns: 1fr; }
      .swap-col { padding-top: 0; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🌐 Language Translator</h1>
    <p>Detect and translate text across 45+ languages using AI</p>
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Error -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Translator row -->
    <div class="translator-row">

      <!-- Input side -->
      <div class="text-box">
        <div class="lang-bar">
          <span id="detected-lang-name" style="font-size:0.9rem; color:#a0aec0;">
            Auto detect
          </span>
          <span class="detected-badge" id="detected-badge" style="display:none"></span>
        </div>
        <textarea
          id="input-text"
          placeholder="Enter text to translate..."
          oninput="updateCharCount()"
        ></textarea>
        <div class="char-count">
          <span id="char-count">0</span> characters
        </div>
      </div>

      <!-- Swap -->
      <div class="swap-col">
        <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇄</button>
      </div>

      <!-- Output side -->
      <div class="text-box">
        <div class="lang-bar">
          <select id="target-lang">
            {% for code, name in languages.items() %}
            <option value="{{ code }}">{{ name }}</option>
            {% endfor %}
          </select>
          <button class="copy-btn" onclick="copyOutput()" title="Copy translation">⧉ Copy</button>
        </div>
        <textarea
          id="output-text"
          placeholder="Translation will appear here..."
          readonly
        ></textarea>
        <div class="char-count">
          <span id="engine-label" style="color:#4a5568; font-size:0.78rem;"></span>
        </div>
      </div>

    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn btn-primary" onclick="translateText()" id="translate-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">Translate</span>
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <!-- Info chips -->
    <div class="info-bar" id="info-bar" style="display:none">
      <div class="info-chip">Detected: <span id="chip-lang">—</span></div>
      <div class="info-chip">Engine: <span id="chip-engine">—</span></div>
      <div class="info-chip">Words: <span id="chip-words">—</span></div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="val">45+</div>
        <div class="lbl">Languages supported</div>
      </div>
      <div class="stat-card">
        <div class="val">98%</div>
        <div class="lbl">Detection accuracy</div>
      </div>
      <div class="stat-card">
        <div class="val" id="translate-count">0</div>
        <div class="lbl">Translations this session</div>
      </div>
    </div>

  </div>

  <script>
    let translateCount = 0;
    let detectedCode   = "";

    function updateCharCount() {
      const text = document.getElementById("input-text").value;
      document.getElementById("char-count").textContent = text.length;

      // Auto detect language after 10 characters
      if (text.length > 10) detectLanguage(text);
      else {
        document.getElementById("detected-badge").style.display = "none";
        document.getElementById("detected-lang-name").textContent = "Auto detect";
        detectedCode = "";
      }
    }

    async function detectLanguage(text) {
      try {
        const res  = await fetch("/detect", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.detected_code) {
          detectedCode = data.detected_code;
          document.getElementById("detected-lang-name").textContent = data.detected_name;
          const badge = document.getElementById("detected-badge");
          badge.textContent    = data.detected_code.toUpperCase();
          badge.style.display  = "inline-block";
        }
      } catch (e) {}
    }

    async function translateText() {
      const text    = document.getElementById("input-text").value.trim();
      const tgtCode = document.getElementById("target-lang").value;

      if (!text) {
        showError("Please enter some text to translate.");
        return;
      }
      if (!detectedCode) {
        showError("Language not detected yet. Please type more text.");
        return;
      }

      // Show loading
      setLoading(true);
      hideError();

      try {
        const res  = await fetch("/translate", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            text:     text,
            src_code: detectedCode,
            tgt_code: tgtCode
          })
        });
        const data = await res.json();

        if (data.error) {
          showError(data.error);
        } else {
          document.getElementById("output-text").value = data.translated;
          document.getElementById("engine-label").textContent = "Engine: " + data.engine;

          // Update info chips
          translateCount++;
          document.getElementById("translate-count").textContent = translateCount;
          document.getElementById("chip-lang").textContent   = detectedCode.toUpperCase();
          document.getElementById("chip-engine").textContent = data.engine;
          document.getElementById("chip-words").textContent  = text.split(/\s+/).length;
          document.getElementById("info-bar").style.display  = "flex";
        }
      } catch (e) {
        showError("Server error. Make sure Flask is running.");
      }

      setLoading(false);
    }

    function swapLanguages() {
      const outputText = document.getElementById("output-text").value;
      const inputText  = document.getElementById("input-text").value;
      if (!outputText) return;
      document.getElementById("input-text").value  = outputText;
      document.getElementById("output-text").value = inputText;
      updateCharCount();
    }

    function copyOutput() {
      const text = document.getElementById("output-text").value;
      if (!text) return;
      navigator.clipboard.writeText(text);
      const btn      = document.querySelector(".copy-btn");
      btn.textContent = "✓ Copied";
      setTimeout(() => btn.textContent = "⧉ Copy", 1500);
    }

    function clearAll() {
      document.getElementById("input-text").value  = "";
      document.getElementById("output-text").value = "";
      document.getElementById("char-count").textContent   = "0";
      document.getElementById("engine-label").textContent = "";
      document.getElementById("detected-badge").style.display   = "none";
      document.getElementById("detected-lang-name").textContent = "Auto detect";
      document.getElementById("info-bar").style.display = "none";
      detectedCode = "";
      hideError();
    }

    function setLoading(state) {
      const btn     = document.getElementById("translate-btn");
      const spinner = document.getElementById("spinner");
      const label   = document.getElementById("btn-label");
      btn.disabled         = state;
      spinner.style.display = state ? "block" : "none";
      label.textContent     = state ? "Translating..." : "Translate";
    }

    function showError(msg) {
      const el         = document.getElementById("error-msg");
      el.textContent   = msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("error-msg").style.display = "none";
    }
  </script>
</body>
</html>
